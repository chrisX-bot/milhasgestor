<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestor de Milhas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#16213E; --ink-soft:#586079; --muted:#8B93A7;
    --paper:#F4F6FA; --surface:#FFFFFF; --line:#E4E8F1;
    --amber:#E8960C; --amber-bg:#FDF3DF;
    --teal:#0E8074; --teal-bg:#E1F3F0;
    --coral:#E23E57; --coral-bg:#FCE6EA;
    --board:#11192F; --board-line:#26314F;
    --shadow:0 1px 2px rgba(22,33,62,.05), 0 8px 24px -12px rgba(22,33,62,.18);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.5}
  button{font-family:inherit; cursor:pointer}
  input,select{font-family:inherit}

  /* ---------- App shell ---------- */
  .app{display:none; grid-template-columns:248px 1fr; min-height:100vh}
  .app.show{display:grid}
  .side{background:var(--ink); color:#fff; padding:26px 18px; position:sticky; top:0; height:100vh; display:flex; flex-direction:column}
  .brand{display:flex; align-items:center; gap:11px; margin-bottom:30px; padding:0 6px}
  .brand .glyph{width:38px; height:38px; border-radius:10px; flex:none; background:linear-gradient(135deg,var(--amber),#F6B73C); display:grid; place-items:center; color:var(--ink)}
  .brand h1{font-family:'Space Grotesk'; font-size:18px; font-weight:600; margin:0; letter-spacing:-.2px}
  .brand small{display:block; font-size:11px; color:#9AA6C4; font-weight:500; letter-spacing:.4px; text-transform:uppercase}
  .nav{display:flex; flex-direction:column; gap:3px; flex:1}
  .nav a{display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:10px; color:#C3CBE0; text-decoration:none; font-size:14px; font-weight:500; transition:.15s}
  .nav a svg{width:18px;height:18px;flex:none;stroke-width:1.8}
  .nav a:hover{background:rgba(255,255,255,.06); color:#fff}
  .nav a.active{background:var(--amber); color:var(--ink); font-weight:600}
  .nav .badge{margin-left:auto; background:var(--coral); color:#fff; font-size:11px; font-weight:700; min-width:19px; height:19px; border-radius:9px; display:grid; place-items:center; padding:0 5px}
  .nav a.active .badge{background:var(--ink); color:#fff}
  .side-foot{padding-top:14px; border-top:1px solid var(--board-line); margin-top:10px}
  .who-foot{font-size:12px; color:#9AA6C4; margin-bottom:10px; padding:0 4px; word-break:break-all}
  .logout{display:flex; align-items:center; gap:8px; width:100%; background:transparent; border:1px solid var(--board-line); color:#C3CBE0; padding:9px 12px; border-radius:9px; font-size:13px; font-weight:500}
  .logout:hover{background:rgba(255,255,255,.06); color:#fff}
  .logout svg{width:15px;height:15px}

  .main{padding:30px 36px 60px; max-width:1080px}
  .page-head{margin-bottom:24px}
  .page-head h2{font-family:'Space Grotesk'; font-size:26px; font-weight:600; margin:0 0 4px; letter-spacing:-.4px}
  .page-head p{margin:0; color:var(--muted); font-size:14px}

  /* ---------- Board ---------- */
  .board{background:var(--board); border-radius:var(--radius); padding:20px 22px; margin-bottom:26px; border:1px solid var(--board-line)}
  .board-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
  .board-top span{font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:#7C87A6; text-transform:uppercase}
  .board-clock{font-family:'Space Mono'; font-size:13px; color:var(--amber); font-weight:700}
  .board-rows{display:flex; flex-direction:column; gap:8px}
  .brow{display:flex; align-items:center; gap:14px; padding:11px 14px; border-radius:9px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05)}
  .brow .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .brow.urgent .dot{background:var(--coral); box-shadow:0 0 0 4px rgba(226,62,87,.18)}
  .brow.warn .dot{background:var(--amber); box-shadow:0 0 0 4px rgba(232,150,12,.16)}
  .brow .b-main{color:#fff; font-size:14px; font-weight:500}
  .brow .b-main b{font-weight:700}
  .brow .b-tag{margin-left:auto; font-family:'Space Mono'; font-size:11px; font-weight:700; letter-spacing:.5px; padding:4px 10px; border-radius:20px; text-transform:uppercase; white-space:nowrap}
  .brow.urgent .b-tag{background:var(--coral); color:#fff}
  .brow.warn .b-tag{background:var(--amber); color:var(--ink)}
  .board-clear{display:flex; align-items:center; gap:10px; color:#8893B2; font-size:13.5px; font-family:'Space Mono'}
  .board-clear svg{width:16px;height:16px;color:var(--teal)}

  /* ---------- Stats ---------- */
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:26px}
  .stat{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow)}
  .stat.hero{background:var(--ink); color:#fff; border-color:var(--ink)}
  .stat .label{font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px}
  .stat.hero .label{color:#9AA6C4}
  .stat .num{font-family:'Space Mono'; font-size:26px; font-weight:700; margin-top:8px; letter-spacing:-.5px}
  .stat.hero .num{color:var(--amber)}
  .stat .sub{font-size:12.5px; color:var(--muted); margin-top:2px}
  .stat.hero .sub{color:#9AA6C4}

  /* ---------- Sections / tables ---------- */
  .sec-head{display:flex; align-items:center; justify-content:space-between; margin:30px 0 14px; gap:12px; flex-wrap:wrap}
  .sec-head h3{font-family:'Space Grotesk'; font-size:17px; font-weight:600; margin:0}
  .btn{border:none; border-radius:10px; padding:10px 16px; font-size:13.5px; font-weight:600; display:inline-flex; align-items:center; gap:7px; transition:.15s}
  .btn svg{width:16px;height:16px;stroke-width:2.2}
  .btn-primary{background:var(--ink); color:#fff} .btn-primary:hover{background:#243358}
  .btn-amber{background:var(--amber); color:var(--ink)} .btn-amber:hover{filter:brightness(1.05)}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line)} .btn-ghost:hover{background:var(--paper)}
  .btn-sm{padding:8px 12px; font-size:12.5px}
  .btn-block{width:100%; justify-content:center; padding:12px}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
  .group-card{margin-bottom:16px}
  .group-head{display:flex; align-items:center; gap:12px; padding:14px 18px; background:#FAFBFD; border-bottom:1px solid var(--line)}
  .group-head .ava{width:34px;height:34px}
  .group-head .gname{font-family:'Space Grotesk'; font-weight:600; font-size:15px}
  .group-head .gsub{font-size:12px; color:var(--muted)}
  .group-head .gtot{margin-left:auto; text-align:right}
  .group-head .gtot .v{font-family:'Space Mono'; font-weight:700; font-size:16px}
  .group-head .gtot .m{font-size:11.5px; color:var(--muted); font-family:'Space Mono'}

  table{width:100%; border-collapse:collapse}
  thead th{text-align:left; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; padding:13px 18px; background:#FAFBFD; border-bottom:1px solid var(--line)}
  tbody td{padding:14px 18px; border-bottom:1px solid var(--line); font-size:14px; vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#FBFCFE}
  .mono{font-family:'Space Mono'}
  .miles{font-family:'Space Mono'; font-weight:700; font-size:14px}
  .money{font-family:'Space Mono'; font-weight:700; font-size:14px; color:var(--teal)}
  .sub-r{font-size:11px; color:var(--muted)}
  .who{display:flex; align-items:center; gap:9px}
  .ava{width:30px;height:30px;border-radius:8px;background:var(--teal-bg); color:var(--teal); display:grid;place-items:center;font-size:12px;font-weight:700;flex:none; font-family:'Space Grotesk'}
  .prog-chip{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; padding:4px 10px; border-radius:7px; background:var(--paper); border:1px solid var(--line)}
  .prog-chip .pd{width:8px;height:8px;border-radius:50%}

  .pill{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:20px; letter-spacing:.3px}
  .pill .pdot{width:7px;height:7px;border-radius:50%}
  .pill.ok{background:var(--teal-bg); color:var(--teal)} .pill.ok .pdot{background:var(--teal)}
  .pill.off{background:#EEF0F5; color:#737B91} .pill.off .pdot{background:#9aa}
  .pill.warn{background:var(--amber-bg); color:#9A6206} .pill.warn .pdot{background:var(--amber)}
  .pill.urgent{background:var(--coral-bg); color:#B41E37} .pill.urgent .pdot{background:var(--coral)}

  .row-acts{display:flex; gap:4px; justify-content:flex-end}
  .icon-btn{border:none;background:transparent;padding:7px;border-radius:8px;color:var(--muted);display:grid;place-items:center;line-height:0}
  .icon-btn svg{width:16px;height:16px;stroke-width:1.9}
  .icon-btn:hover{background:var(--paper); color:var(--ink)}
  .icon-btn.del:hover{background:var(--coral-bg); color:var(--coral)}

  .empty{padding:46px 24px; text-align:center}
  .empty .ico{width:52px;height:52px;border-radius:14px;background:var(--paper);display:grid;place-items:center;margin:0 auto 14px;color:var(--muted)}
  .empty .ico svg{width:24px;height:24px}
  .empty h4{font-family:'Space Grotesk'; margin:0 0 5px; font-size:16px}
  .empty p{margin:0 auto 18px; color:var(--muted); font-size:13.5px; max-width:360px}

  .note{display:flex; gap:10px; align-items:flex-start; background:var(--amber-bg); border:1px solid #F2DBA6; color:#7A5206; padding:12px 14px; border-radius:11px; font-size:13px; margin-bottom:18px}
  .note svg{width:17px;height:17px;flex:none;margin-top:1px}
  .note a{color:#7A5206; font-weight:700; cursor:pointer; text-decoration:underline}

  /* ---------- Valores config ---------- */
  .vlist{padding:6px 0}
  .vrow{display:flex; align-items:center; gap:14px; padding:13px 18px; border-bottom:1px solid var(--line)}
  .vrow:last-child{border-bottom:none}
  .vrow .vlabel{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14px; flex:1}
  .vrow .vlabel .pd{width:9px;height:9px;border-radius:50%}
  .vinput{display:flex; align-items:center; gap:6px}
  .vinput span{font-family:'Space Mono'; font-size:13px; color:var(--muted)}
  .vinput input{width:92px; padding:9px 11px; border:1px solid var(--line); border-radius:9px; font-family:'Space Mono'; font-size:14px; text-align:right}
  .vinput input:focus{outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(232,150,12,.14)}
  .vinput em{font-style:normal; font-size:11px; color:var(--muted); white-space:nowrap}
  .vsub{font-size:11px; color:var(--muted); margin-top:1px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(17,25,47,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:18px;width:100%;max-width:480px;box-shadow:0 24px 60px -12px rgba(17,25,47,.4);max-height:92vh;overflow:auto}
  .modal-head{padding:22px 24px 0; display:flex; justify-content:space-between; align-items:flex-start}
  .modal-head h3{font-family:'Space Grotesk'; margin:0; font-size:19px; font-weight:600}
  .modal-head p{margin:3px 0 0; font-size:13px; color:var(--muted)}
  .modal-body{padding:18px 24px 24px}
  .field{margin-bottom:15px}
  .field label{display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--ink-soft)}
  .field label .opt{color:var(--muted); font-weight:500}
  .field input,.field select{width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:var(--surface); color:var(--ink); transition:.15s}
  .field input:focus,.field select:focus{outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(232,150,12,.14)}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:13px}
  .modal-foot{display:flex; gap:10px; justify-content:flex-end; margin-top:6px}
  .hint{font-size:12px; color:var(--muted); margin-top:-8px; margin-bottom:14px}
  .err{font-size:12px;color:var(--coral);margin-top:5px;display:none}
  .err.show{display:block}

  /* ---------- Gate (setup / auth) ---------- */
  .gate{display:none; min-height:100vh; align-items:center; justify-content:center; padding:24px}
  .gate.show{display:flex}
  .gate-card{background:var(--surface); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); width:100%; max-width:440px; padding:30px}
  .gate-brand{display:flex; align-items:center; gap:11px; margin-bottom:22px}
  .gate-brand .glyph{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--amber),#F6B73C);display:grid;place-items:center;color:var(--ink)}
  .gate-brand h1{font-family:'Space Grotesk'; font-size:19px; margin:0}
  .gate-brand small{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .gate h2{font-family:'Space Grotesk'; font-size:20px; margin:0 0 4px}
  .gate .lead{color:var(--muted); font-size:13.5px; margin:0 0 20px}
  .gate .field{margin-bottom:14px}
  .seg{display:flex; background:var(--paper); border-radius:10px; padding:4px; margin-bottom:18px}
  .seg button{flex:1; border:none; background:transparent; padding:9px; border-radius:7px; font-weight:600; font-size:13.5px; color:var(--muted)}
  .seg button.active{background:var(--surface); color:var(--ink); box-shadow:var(--shadow)}
  .gate-wide{max-width:620px}
  .steps{counter-reset:s; margin:0; padding:0; list-style:none}
  .steps li{counter-increment:s; position:relative; padding:0 0 16px 38px; font-size:13.5px; color:var(--ink-soft)}
  .steps li::before{content:counter(s); position:absolute; left:0; top:-1px; width:26px;height:26px;border-radius:8px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:'Space Mono';font-weight:700;font-size:12px}
  .steps li b{color:var(--ink)}
  .codeblk{background:#0F1830; color:#CBD5F0; font-family:'Space Mono'; font-size:11.5px; line-height:1.6; border-radius:11px; padding:14px 16px; overflow:auto; max-height:220px; white-space:pre; margin:10px 0 0}
  .gate-err{background:var(--coral-bg); color:#B41E37; font-size:13px; padding:10px 13px; border-radius:9px; margin-bottom:14px; display:none}
  .gate-err.show{display:block}

  /* ---------- Toast ---------- */
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:13px 20px; border-radius:11px; font-size:13.5px; font-weight:500; box-shadow:0 12px 30px -8px rgba(17,25,47,.5); opacity:0; pointer-events:none; transition:.25s; z-index:80; display:flex; align-items:center; gap:9px}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .toast svg{width:17px;height:17px;color:var(--amber)}
  .toast.bad svg{color:var(--coral)}

  .mobnav{display:none}
  @media(max-width:860px){
    .app.show{grid-template-columns:1fr}
    .side{display:none}
    .mobnav{display:flex; position:sticky; top:0; z-index:30; background:var(--ink); padding:12px 14px; align-items:center; gap:8px; overflow-x:auto}
    .mobnav .brand-m{display:flex;align-items:center;gap:9px;color:#fff;margin-right:4px;flex:none}
    .mobnav .brand-m .glyph{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--amber),#F6B73C);display:grid;place-items:center;color:var(--ink)}
    .mobnav .brand-m b{font-family:'Space Grotesk';font-size:14px}
    .mobnav a{color:#C3CBE0;text-decoration:none;font-size:13px;font-weight:600;padding:7px 11px;border-radius:8px;white-space:nowrap;cursor:pointer}
    .mobnav a.active{background:var(--amber);color:var(--ink)}
    .mobnav .lo{margin-left:auto;color:#9AA6C4}
    .main{padding:20px 16px 50px}
    .grid2{grid-template-columns:1fr}
    .page-head h2{font-size:22px}
    thead{display:none}
    table,tbody,tr,td{display:block;width:100%}
    tbody tr{padding:14px 16px;border-bottom:1px solid var(--line)}
    tbody tr:hover{background:transparent}
    tbody td{padding:5px 0;border:none;display:flex;justify-content:space-between;align-items:center;gap:10px}
    tbody td::before{content:attr(data-l);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    tbody td.no-l::before{content:none}
    .row-acts{justify-content:flex-start}
    .vrow{flex-wrap:wrap}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--amber); outline-offset:2px}
</style>
</head>
<body>

<!-- ============ GATE (setup ou login) ============ -->
<div class="gate" id="gate"></div>

<!-- ============ APP ============ -->
<div class="app" id="app">
  <aside class="side">
    <div class="brand">
      <div class="glyph"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div>
      <div><h1>Gestor de Milhas</h1><small>Saldos &amp; Clubes</small></div>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Visão geral<span class="badge" id="nav-badge" style="display:none"></span></a>
      <a data-view="saldos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Saldo de milhas</a>
      <a data-view="clubes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 7v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V7z"/></svg>Clubes<span class="badge" id="nav-badge-club" style="display:none"></span></a>
      <a data-view="benef"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Beneficiários</a>
      <a data-view="values"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5a2 2 0 0 1 2-1.5h1a2 2 0 0 1 0 4h-1a2 2 0 0 0 0 4h1a2 2 0 0 0 2-1.5"/></svg>Valor das milhas</a>
    </nav>
    <div class="side-foot">
      <div class="who-foot" id="who-foot"></div>
      <button class="logout" onclick="signOut()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sair</button>
    </div>
  </aside>

  <div class="mobnav" id="mobnav">
    <div class="brand-m"><div class="glyph"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div><b>Milhas</b></div>
    <a data-view="dash">Visão geral</a>
    <a data-view="saldos">Saldos</a>
    <a data-view="clubes">Clubes</a>
    <a data-view="benef">Pessoas</a>
    <a data-view="values">Valores</a>

const SQL_SCHEMA = `create table if not exists public.beneficiaries (
  id uuid primary key default gen_random_uuid(),
  user_id uuid not null default auth.uid() references auth.users(id) on delete cascade,
  name text not null, relationship text, created_at timestamptz default now());

create table if not exists public.balances (

create table if not exists public.clubs (

create table if not exists public.mile_values (

create policy "own_b" on public.beneficiaries for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_s" on public.balances for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_c" on public.clubs for all using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own_v" on public.mile_values for all using (auth.uid()=user_id) with check (auth.uid()=user_id);`;

const PROGRAMS = [
  {id:'smiles',  name:'Smiles',     color:'#FF5800'},
  {id:'latam',   name:'Latam Pass', color:'#1B0088'},
  {id:'livelo',  name:'Livelo',     color:'#E5007E'},

  {id:'amex',    name:'Membership Rewards', color:'#016FD0'},
  {id:'outro',   name:'Outro',      color:'#586079'},
];
const DEFAULT_VALUES = { smiles:15.5, latam:25 }; // R$ por 1.000 milhas (editável)

let sb=null, CURRENT_UID=null, USER_EMAIL='';
let STATE = { beneficiaries:[], balances:[], clubs:[], values:{} };
let view='dash';

const configured = SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.includes('COLE_') && !SUPABASE_ANON_KEY.includes('COLE_');

/* ===================== Utilitários ===================== */
const progById = id => PROGRAMS.find(p=>p.id===id) || PROGRAMS[PROGRAMS.length-1];
function progLabel(rec){ return rec.program==='outro' ? (rec.program_custom||'Outro') : progById(rec.program).name; }
function progColor(rec){ return progById(rec.program).color; }
function valueKey(rec){ return rec.program==='outro' ? 'outro:'+((rec.program_custom||'').trim().toLowerCase()) : rec.program; }
function rateOf(rec){ const k=valueKey(rec); return STATE.values[k] ?? DEFAULT_VALUES[rec.program] ?? 0; }
function moneyOf(rec){ return (Number(rec.amount)||0)/1000 * rateOf(rec); }

const fmtNum = n => (Number(n)||0).toLocaleString('pt-BR');
const fmtBRL = v => (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
function fmtDate(s){ if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function todayStr(){ const t=new Date(); const off=t.getTimezoneOffset()*60000; return new Date(t-off).toISOString().slice(0,10); }
function daysUntil(s){ if(!s) return null; const t=new Date(); t.setHours(0,0,0,0); const [y,m,d]=s.split('-').map(Number); const x=new Date(y,m-1,d); x.setHours(0,0,0,0); return Math.round((x-t)/86400000); }
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function benefName(id){ const b=STATE.beneficiaries.find(x=>x.id===id); return b?b.name:'—'; }
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

function clubStatus(c){
  if(c.status==='inativo') return {key:'off', label:'Inativo', tag:null, days:null};
  const d=daysUntil(c.cancel_date);
  if(d===null) return {key:'ok', label:'Ativo', tag:null, days:null};
  if(d<0)   return {key:'urgent', label:'Cancelar', tag:`Atrasado ${Math.abs(d)}d`, days:d};
  if(d===0) return {key:'urgent', label:'Cancelar', tag:'Cancelar hoje', days:d};
  if(d<=7)  return {key:'warn', label:'Ativo', tag:`Cancelar em ${d}d`, days:d};
  return {key:'ok', label:'Ativo', tag:`Cancelar em ${d}d`, days:d};
}
function expStatus(s){
  const d=daysUntil(s);
  if(d===null) return {key:'none', days:null};
  if(d<0)  return {key:'urgent', label:`Vencidas há ${Math.abs(d)}d`, days:d};
  if(d<=30)return {key:'warn', label:`Vence em ${d}d`, days:d};
  return {key:'ok', label:`Vence em ${d}d`, days:d};
}

/* ===================== Toast ===================== */
let toastT;
function toast(msg, kind){
  const el=document.getElementById('toast');
  el.className='toast show'+(kind==='bad'?' bad':'');
  el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${kind==='bad'?'<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>':'<path d="M20 6 9 17l-5-5"/>'}</svg><span>${msg}</span>`;
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ===================== Camada de dados (Supabase) ===================== */
async function loadAll(){
  const [b,bal,cl,mv]=await Promise.all([
    sb.from('beneficiaries').select('*').order('name'),
    sb.from('balances').select('*'),
    sb.from('clubs').select('*'),
    sb.from('mile_values').select('*'),
  ]);
  if(b.error||bal.error||cl.error||mv.error){ toast('Erro ao carregar dados.','bad'); console.error(b.error||bal.error||cl.error||mv.error); }
  STATE.beneficiaries = b.data||[];
  STATE.balances      = bal.data||[];
  STATE.clubs         = cl.data||[];
  STATE.values        = {};
  (mv.data||[]).forEach(r=> STATE.values[r.program_key]=Number(r.value_per_1000));
}
async function dbInsert(table,row){
  const {data,error}=await sb.from(table).insert({user_id:CURRENT_UID,...row}).select().single();
  if(error){ toast('Não foi possível salvar.','bad'); console.error(error); return null; }
  return data;
}
async function dbUpdate(table,id,patch){
  const {error}=await sb.from(table).update(patch).eq('id',id);
  if(error){ toast('Não foi possível atualizar.','bad'); console.error(error); return false; }
  return true;
}
async function dbDelete(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){ toast('Não foi possível excluir.','bad'); console.error(error); return false; }
  return true;
}

function setView(v){ view=v; renderNav(); render(); window.scrollTo(0,0); }

/* -------- Visão geral -------- */
function viewDash(){
  const alerts=[];
  STATE.clubs.forEach(c=>{ const s=clubStatus(c); if(['urgent','warn'].includes(s.key)) alerts.push({kind:s.key, main:`Clube <b>${progLabel(c)}</b> de ${benefName(c.beneficiary_id)}`, tag:s.tag, sort:s.days}); });
  STATE.balances.forEach(b=>{ const s=expStatus(b.expiration_date); if(['urgent','warn'].includes(s.key)) alerts.push({kind:s.key, main:`<b>${fmtNum(b.amount)}</b> milhas ${progLabel(b)} de ${benefName(b.beneficiary_id)}`, tag:s.label, sort:s.days}); });
  alerts.sort((a,b)=>(a.sort??999)-(b.sort??999));

  const totalMoney=STATE.balances.reduce((s,b)=>s+moneyOf(b),0);
  const totalMiles=STATE.balances.reduce((s,b)=>s+(Number(b.amount)||0),0);
  const activeClubs=STATE.clubs.filter(c=>c.status==='ativo').length;

  let board = alerts.length
    ? alerts.map(a=>`<div class="brow ${a.kind}"><span class="dot"></span><span class="b-main">${a.main}</span><span class="b-tag">${a.tag}</span></div>`).join('')
    : `<div class="board-clear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Nenhuma pendência. Tudo em dia por aqui.</div>`;

  // programas com milhas mas sem valor configurado
  const unpriced=[...new Set(STATE.balances.filter(b=>Number(b.amount)>0 && rateOf(b)===0).map(b=>progLabel(b)))];
  const empty=!STATE.balances.length && !STATE.clubs.length && !STATE.beneficiaries.length;

  return `
  <div class="page-head"><h2>Visão geral</h2><p>Quadro de avisos do dia ${fmtDate(todayStr())} — saldos vencendo e clubes a cancelar.</p></div>
  <div class="board"><div class="board-top"><span>Quadro de avisos</span><span class="board-clock">${alerts.length?alerts.length+' PENDÊNCIA'+(alerts.length>1?'S':''):'OK'}</span></div><div class="board-rows">${board}</div></div>

  ${unpriced.length?`<div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><div>Sem valor definido para ${unpriced.join(', ')} — essas milhas entram como R$ 0. <a onclick="setView('values')">Configurar valores</a></div></div>`:''}

  <div class="stats">
    <div class="stat hero"><div class="label">Valor total em dinheiro</div><div class="num">${fmtBRL(totalMoney)}</div><div class="sub">${fmtNum(totalMiles)} milhas no total</div></div>
    <div class="stat"><div class="label">Clubes ativos</div><div class="num">${activeClubs}</div><div class="sub">${STATE.clubs.length} clube(s) no total</div></div>
    <div class="stat"><div class="label">Beneficiários</div><div class="num">${STATE.beneficiaries.length}</div><div class="sub">pessoas cadastradas</div></div>
  </div>

  ${empty ? emptyDash() : `<div class="sec-head"><h3>Valor por programa</h3></div>${byProgramTable()}`}`;
}
function byProgramTable(){
  const map={};
  STATE.balances.forEach(b=>{ const k=progLabel(b); map[k]=map[k]||{miles:0,money:0,color:progColor(b),count:0}; map[k].miles+=Number(b.amount)||0; map[k].money+=moneyOf(b); map[k].count++; });
  const rows=Object.entries(map).sort((a,b)=>b[1].money-a[1].money);
  if(!rows.length) return `<div class="card"><div class="empty"><h4>Sem saldos ainda</h4><p>Cadastre seus saldos para ver o resumo por programa.</p><button class="btn btn-amber" data-act="go-saldos">Ir para saldos</button></div></div>`;
  return `<div class="card"><table><thead><tr><th>Programa</th><th>Registros</th><th style="text-align:right">Milhas</th><th style="text-align:right">Valor</th></tr></thead><tbody>
    ${rows.map(([name,v])=>`<tr>
      <td data-l="Programa" class="no-l"><span class="prog-chip"><span class="pd" style="background:${v.color}"></span>${name}</span></td>
      <td data-l="Registros" class="mono">${v.count}</td>
      <td data-l="Milhas" class="miles" style="text-align:right">${fmtNum(v.miles)}</td>
      <td data-l="Valor" class="money" style="text-align:right">${fmtBRL(v.money)}</td>
    </tr>`).join('')}
  </tbody></table></div>`;
}
function emptyDash(){
  return `<div class="card"><div class="empty"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div><h4>Comece pelos beneficiários</h4><p>Cadastre você e seus dependentes e depois registre saldos e clubes para cada um.</p><button class="btn btn-amber" data-act="go-benef">Cadastrar beneficiário</button></div></div>`;
}

/* -------- Saldos (agrupados por pessoa) -------- */
function viewSaldos(){
  const total=STATE.balances.length;
  let body;
  if(!total){
    body=`<div class="card"><div class="empty"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><h4>Nenhum saldo cadastrado</h4><p>Escolha o programa, o beneficiário e informe quanto há de milhas e em qual data.</p><button class="btn btn-amber" data-act="add-saldo">Adicionar saldo</button></div></div>`;
  }else{
    const groups=STATE.beneficiaries.map(b=>({b, items:STATE.balances.filter(x=>x.beneficiary_id===b.id)})).filter(g=>g.items.length);
    const orphan=STATE.balances.filter(x=>!STATE.beneficiaries.some(b=>b.id===x.beneficiary_id));
    if(orphan.length) groups.push({b:{id:null,name:'Sem beneficiário'}, items:orphan});
    body=groups.map(g=>{
      const money=g.items.reduce((s,x)=>s+moneyOf(x),0);
      const miles=g.items.reduce((s,x)=>s+(Number(x.amount)||0),0);
      return `<div class="card group-card">
        <div class="group-head">
          <span class="ava">${initials(g.b.name)}</span>
          <div><div class="gname">${g.b.name}</div><div class="gsub">${g.items.length} registro(s)</div></div>
          <div class="gtot"><div class="v">${fmtBRL(money)}</div><div class="m">${fmtNum(miles)} milhas</div></div>
        </div>
        <table><thead><tr><th>Programa</th><th>Milhas</th><th>Valor</th><th>Data</th><th>Vencimento</th><th></th></tr></thead><tbody>
        ${g.items.sort((a,b)=>(b.balance_date||'').localeCompare(a.balance_date||'')).map(b=>{
          const es=expStatus(b.expiration_date);
          let venc='<span class="mono sub-r">Sem data</span>';
          if(b.expiration_date){ const cls=es.key==='urgent'?'urgent':es.key==='warn'?'warn':'off'; venc=`<div><span class="mono">${fmtDate(b.expiration_date)}</span><br><span class="pill ${cls}" style="margin-top:4px"><span class="pdot"></span>${es.label}</span></div>`; }
          return `<tr>
            <td data-l="Programa" class="no-l"><span class="prog-chip"><span class="pd" style="background:${progColor(b)}"></span>${progLabel(b)}</span></td>
            <td data-l="Milhas" class="miles">${fmtNum(b.amount)}</td>
            <td data-l="Valor" class="money">${fmtBRL(moneyOf(b))}</td>
            <td data-l="Data" class="mono">${fmtDate(b.balance_date)}</td>
            <td data-l="Vencimento">${venc}</td>
            <td class="no-l"><div class="row-acts">
              <button class="icon-btn" data-act="edit-saldo" data-id="${b.id}" aria-label="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
              <button class="icon-btn del" data-act="del-saldo" data-id="${b.id}" aria-label="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
            </div></td></tr>`;}).join('')}
        </tbody></table></div>`;
    }).join('');
  }
  return `<div class="page-head"><h2>Saldo de milhas</h2><p>Agrupado por pessoa. Cada saldo mostra o valor convertido em reais.</p></div>
    <div class="sec-head"><h3>${total} registro(s)</h3>${total?`<button class="btn btn-primary btn-sm" data-act="add-saldo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Adicionar saldo</button>`:''}</div>${body}`;
}

/* -------- Clubes -------- */

      ${list.map(c=>{

            <button class="icon-btn del" data-act="del-clube" data-id="${c.id}" aria-label="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
          </div></td></tr>`;}).join('')}
    </tbody></table></div>`;

}

/* -------- Beneficiários -------- */
function viewBenef(){

    body=`<div class="card"><div class="empty"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><h4>Nenhum beneficiário</h4><p>Cadastre você e seus dependentes. Eles aparecem nos saldos e clubes.</p><button class="btn btn-amber" data-act="add-benef">Adicionar beneficiário</button></div></div>`;
  }else{
    body=`<div class="card"><table><thead><tr><th>Nome</th><th>Relação</th><th>Saldos</th><th>Valor</th><th>Clubes</th><th></th></tr></thead><tbody>
      ${list.map(b=>{

        const money=its.reduce((s,x)=>s+moneyOf(x),0);
        const cc=STATE.clubs.filter(x=>x.beneficiary_id===b.id).length;
        return `<tr>
          <td data-l="Nome" class="no-l"><div class="who"><span class="ava">${initials(b.name)}</span>${b.name}</div></td>
          <td data-l="Relação">${b.relationship||'—'}</td>
          <td data-l="Saldos" class="mono">${its.length}</td>
          <td data-l="Valor" class="money">${fmtBRL(money)}</td>
          <td data-l="Clubes" class="mono">${cc}</td>
          <td class="no-l"><div class="row-acts">
            <button class="icon-btn" data-act="edit-benef" data-id="${b.id}" aria-label="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
            <button class="icon-btn del" data-act="del-benef" data-id="${b.id}" aria-label="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
          </div></td></tr>`;}).join('')}
    </tbody></table></div>`;
  }
  return `<div class="page-head"><h2>Beneficiários</h2><p>Você e seus dependentes. Cada saldo e clube pertence a uma destas pessoas.</p></div>
    <div class="sec-head"><h3>${list.length} pessoa(s)</h3>${list.length?`<button class="btn btn-primary btn-sm" data-act="add-benef"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Adicionar</button>`:''}</div>${body}`;
}

/* -------- Valor das milhas -------- */
function viewValues(){
  const customNames=[...new Set([...STATE.balances,...STATE.clubs].filter(r=>r.program==='outro').map(r=>(r.program_custom||'').trim()).filter(Boolean))];
  const stdRows=PROGRAMS.filter(p=>p.id!=='outro').map(p=>{
    const cur = STATE.values[p.id] ?? DEFAULT_VALUES[p.id] ?? '';
    return `<div class="vrow">
      <div class="vlabel"><span class="pd" style="background:${p.color}"></span><div>${p.name}<div class="vsub">Programa</div></div></div>
      <div class="vinput"><span>R$</span><input type="number" step="0.01" min="0" data-key="${p.id}" value="${cur}"><em>/ 1.000</em></div>
    </div>`;}).join('');
  const customRows=customNames.map(n=>{
    const k='outro:'+n.toLowerCase(); const cur=STATE.values[k] ?? '';
    return `<div class="vrow">
      <div class="vlabel"><span class="pd" style="background:#586079"></span><div>${n}<div class="vsub">Programa personalizado</div></div></div>
      <div class="vinput"><span>R$</span><input type="number" step="0.01" min="0" data-key="${k}" value="${cur}"><em>/ 1.000</em></div>
    </div>`;}).join('');
  return `<div class="page-head"><h2>Valor das milhas</h2><p>Defina quanto vale cada 1.000 milhas. Esse valor calcula o total em reais.</p></div>
    <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><div>Exemplo: 100.000 milhas Smiles a R$ 15,50 / 1.000 = <b>R$ 1.550,00</b>.</div></div>
    <div class="card"><div class="vlist">${stdRows}${customRows?`<div class="vrow" style="background:#FAFBFD;font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 18px">Personalizados</div>${customRows}`:''}</div></div>
    <div class="sec-head" style="justify-content:flex-end"><button class="btn btn-primary" onclick="saveValues()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>Salvar valores</button></div>`;
}
async function saveValues(){
  const rows=[];
  document.querySelectorAll('.vinput input[data-key]').forEach(inp=>{
    const v=inp.value.trim();
    if(v!=='' && Number(v)>=0) rows.push({user_id:CURRENT_UID, program_key:inp.dataset.key, value_per_1000:Number(v)});
  });
  if(!rows.length){ toast('Informe ao menos um valor.','bad'); return; }
  const {error}=await sb.from('mile_values').upsert(rows,{onConflict:'user_id,program_key'});
  if(error){ toast('Não foi possível salvar.','bad'); console.error(error); return; }
  rows.forEach(r=>STATE.values[r.program_key]=r.value_per_1000);
  renderNav(); render(); toast('Valores salvos.');
}

/* ===================== Ações ===================== */
function bindActions(){
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',()=>{
      const act=el.dataset.act, id=el.dataset.id;
      if(act==='go-benef') return setView('benef');
      if(act==='go-saldos') return setView('saldos');
      if(act==='add-benef') return openBenef();
      if(act==='add-saldo') return openSaldo();
      if(act==='edit-saldo') return openSaldo(id);
      if(act==='del-saldo') return confirmDel('saldo',id);
      if(act==='add-clube') return openClube();
      if(act==='edit-clube') return openClube(id);
      if(act==='del-clube') return confirmDel('clube',id);
      if(act==='edit-benef') return openBenef(id);
      if(act==='del-benef') return confirmDel('benef',id);
    });
  });
}

/* ===================== Modais ===================== */
const overlay=document.getElementById('overlay'), modalEl=document.getElementById('modal');
function openModal(html){ modalEl.innerHTML=html; overlay.classList.add('show'); }
function closeModal(){ overlay.classList.remove('show'); }
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
function benefOptions(sel){ return STATE.beneficiaries.map(b=>`<option value="${b.id}" ${b.id===sel?'selected':''}>${b.name}</option>`).join(''); }
function progOptions(sel){ return PROGRAMS.map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${p.name}</option>`).join(''); }
function toggleCustom(sel,wrap){ document.getElementById(wrap).style.display=document.getElementById(sel).value==='outro'?'block':'none'; }

function openBenef(id){
  const b=id?STATE.beneficiaries.find(x=>x.id===id):null;
  openModal(`<div class="modal-head"><div><h3>${b?'Editar beneficiário':'Novo beneficiário'}</h3><p>Pessoa que possui as milhas ou o clube.</p></div></div>
  <div class="modal-body">
    <div class="field"><label>Nome</label><input id="f-name" value="${b?b.name:''}" placeholder="Ex.: Maria Silva"><div class="err" id="e-name">Informe um nome.</div></div>
    <div class="field"><label>Relação <span class="opt">(opcional)</span></label><select id="f-rel">${['','Titular','Cônjuge','Filho(a)','Pai/Mãe','Outro dependente'].map(r=>`<option value="${r}" ${b&&b.relationship===r?'selected':''}>${r||'Selecionar…'}</option>`).join('')}</select></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveBenef('${id||''}')">${b?'Salvar':'Adicionar'}</button></div>
  </div>`);
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}
async function saveBenef(id){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('e-name').classList.add('show'); return; }
  const rel=document.getElementById('f-rel').value;
  if(id){ if(await dbUpdate('beneficiaries',id,{name,relationship:rel})){ const b=STATE.beneficiaries.find(x=>x.id===id); b.name=name; b.relationship=rel; } }
  else { const row=await dbInsert('beneficiaries',{name,relationship:rel}); if(row) STATE.beneficiaries.push(row); }
  STATE.beneficiaries.sort((a,b)=>a.name.localeCompare(b.name));
  closeModal(); renderNav(); render(); toast(id?'Beneficiário atualizado.':'Beneficiário adicionado.');
}

function openSaldo(id){
  if(!STATE.beneficiaries.length) return needBenef();
  const s=id?STATE.balances.find(x=>x.id===id):null;
  openModal(`<div class="modal-head"><div><h3>${s?'Editar saldo':'Novo saldo de milhas'}</h3><p>Quanto há, de quem e em qual programa.</p></div></div>
  <div class="modal-body">
    <div class="field"><label>Beneficiário</label><select id="f-ben">${benefOptions(s?s.beneficiary_id:'')}</select></div>
    <div class="field"><label>Programa</label><select id="f-prog" onchange="toggleCustom('f-prog','wrap-custom')">${progOptions(s?s.program:'smiles')}</select></div>
    <div class="field" id="wrap-custom" style="display:${s&&s.program==='outro'?'block':'none'}"><label>Nome do programa</label><input id="f-custom" value="${s&&s.program_custom?s.program_custom:''}" placeholder="Ex.: TAP Miles&Go"></div>
    <div class="grid2">
      <div class="field"><label>Saldo (milhas)</label><input id="f-amount" type="number" inputmode="numeric" min="0" value="${s?s.amount:''}" placeholder="0"><div class="err" id="e-amount">Informe o saldo.</div></div>
      <div class="field"><label>Data do saldo</label><input id="f-bdate" type="date" value="${s?s.balance_date:todayStr()}"></div>
    </div>
    <div class="field"><label>Vencimento das milhas <span class="opt">(opcional)</span></label><input id="f-exp" type="date" value="${s&&s.expiration_date?s.expiration_date:''}"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveSaldo('${id||''}')">${s?'Salvar':'Adicionar'}</button></div>
  </div>`);
}
async function saveSaldo(id){
  const amount=document.getElementById('f-amount').value;
  if(amount===''||Number(amount)<0){ document.getElementById('e-amount').classList.add('show'); return; }
  const row={ beneficiary_id:document.getElementById('f-ben').value, program:document.getElementById('f-prog').value, program_custom:document.getElementById('f-custom')?document.getElementById('f-custom').value.trim():'', amount:Number(amount), balance_date:document.getElementById('f-bdate').value||todayStr(), expiration_date:document.getElementById('f-exp').value||null };
  if(id){ if(await dbUpdate('balances',id,row)) Object.assign(STATE.balances.find(x=>x.id===id),row); }
  else { const r=await dbInsert('balances',row); if(r) STATE.balances.push(r); }
  closeModal(); renderNav(); render(); toast(id?'Saldo atualizado.':'Saldo adicionado.');
}

function openClube(id){
  if(!STATE.beneficiaries.length) return needBenef();
  const c=id?STATE.clubs.find(x=>x.id===id):null;
  openModal(`<div class="modal-head"><div><h3>${c?'Editar clube':'Novo clube'}</h3><p>Assinatura de milhas e quando cancelar.</p></div></div>
  <div class="modal-body">
    <div class="field"><label>Beneficiário</label><select id="f-ben">${benefOptions(c?c.beneficiary_id:'')}</select></div>
    <div class="field"><label>Programa do clube</label><select id="f-prog" onchange="toggleCustom('f-prog','wrap-custom')">${progOptions(c?c.program:'smiles')}</select></div>
    <div class="field" id="wrap-custom" style="display:${c&&c.program==='outro'?'block':'none'}"><label>Nome do programa</label><input id="f-custom" value="${c&&c.program_custom?c.program_custom:''}" placeholder="Ex.: Clube Qatar"></div>
    <div class="field"><label>Situação</label><select id="f-status"><option value="ativo" ${!c||c.status==='ativo'?'selected':''}>Ativo</option><option value="inativo" ${c&&c.status==='inativo'?'selected':''}>Inativo</option></select></div>
    <div class="grid2">
      <div class="field"><label>Data de adesão</label><input id="f-join" type="date" value="${c&&c.join_date?c.join_date:todayStr()}"></div>
      <div class="field"><label>Cancelar até <span class="opt">(opcional)</span></label><input id="f-cancel" type="date" value="${c&&c.cancel_date?c.cancel_date:''}"></div>
    </div>
    <div class="hint">Se hoje passar de “Cancelar até” e o clube estiver ativo, ele vira pendência no quadro de avisos.</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveClube('${id||''}')">${c?'Salvar':'Adicionar'}</button></div>
  </div>`);
}
async function saveClube(id){
  const row={ beneficiary_id:document.getElementById('f-ben').value, program:document.getElementById('f-prog').value, program_custom:document.getElementById('f-custom')?document.getElementById('f-custom').value.trim():'', status:document.getElementById('f-status').value, join_date:document.getElementById('f-join').value||todayStr(), cancel_date:document.getElementById('f-cancel').value||null };
  if(id){ if(await dbUpdate('clubs',id,row)) Object.assign(STATE.clubs.find(x=>x.id===id),row); }
  else { const r=await dbInsert('clubs',row); if(r) STATE.clubs.push(r); }
  closeModal(); renderNav(); render(); toast(id?'Clube atualizado.':'Clube adicionado.');
}

function needBenef(){
  openModal(`<div class="modal-head"><div><h3>Cadastre uma pessoa antes</h3><p>Saldos e clubes pertencem a um beneficiário.</p></div></div>
  <div class="modal-body"><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Agora não</button><button class="btn btn-amber" onclick="openBenef()">Cadastrar beneficiário</button></div></div>`);
}
function confirmDel(type,id){
  const labels={saldo:'este saldo',clube:'este clube',benef:'este beneficiário'};
  let extra='';
  if(type==='benef'){ const sc=STATE.balances.filter(x=>x.beneficiary_id===id).length, cc=STATE.clubs.filter(x=>x.beneficiary_id===id).length; if(sc||cc) extra=`<div class="hint" style="margin-top:0">Também serão removidos ${sc} saldo(s) e ${cc} clube(s) desta pessoa.</div>`; }
  openModal(`<div class="modal-head"><div><h3>Excluir</h3><p>Remover ${labels[type]}?</p></div></div>
  <div class="modal-body">${extra}<div class="modal-foot" style="margin-top:8px"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn" style="background:var(--coral);color:#fff" onclick="doDel('${type}','${id}')">Excluir</button></div></div>`);
}
async function doDel(type,id){
  if(type==='saldo'){ if(await dbDelete('balances',id)) STATE.balances=STATE.balances.filter(x=>x.id!==id); }
  if(type==='clube'){ if(await dbDelete('clubs',id)) STATE.clubs=STATE.clubs.filter(x=>x.id!==id); }
  if(type==='benef'){ if(await dbDelete('beneficiaries',id)){ STATE.beneficiaries=STATE.beneficiaries.filter(x=>x.id!==id); STATE.balances=STATE.balances.filter(x=>x.beneficiary_id!==id); STATE.clubs=STATE.clubs.filter(x=>x.beneficiary_id!==id); } }
  closeModal(); renderNav(); render(); toast('Item excluído.');
}

/* ===================== Gate: setup / auth ===================== */
const gate=document.getElementById('gate'), appEl=document.getElementById('app');
function showSetup(){
  appEl.classList.remove('show'); gate.classList.add('show');
  gate.innerHTML=`<div class="gate-card gate-wide">
    <div class="gate-brand"><div class="glyph"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div><div><h1>Gestor de Milhas</h1><small>Configuração inicial</small></div></div>
    <h2>Conecte ao seu Supabase</h2>
    <p class="lead">Leva ~3 minutos e é gratuito. Depois você acessa de qualquer dispositivo, inclusive o celular.</p>
    <ol class="steps">
      <li>Crie um projeto grátis em <b>supabase.com</b>.</li>
      <li>Abra <b>SQL Editor</b>, cole o código abaixo e clique em <b>Run</b> (cria as tabelas).<div class="codeblk">${SQL_SCHEMA.replace(/</g,'&lt;')}</div></li>
      <li>Em <b>Settings → API</b>, copie a <b>Project URL</b> e a chave <b>anon public</b>.</li>
      <li>Abra este arquivo num editor e cole as duas no topo, em <b>SUPABASE_URL</b> e <b>SUPABASE_ANON_KEY</b>.</li>
      <li>Hospede o arquivo (Netlify, Vercel ou GitHub Pages — todos têm plano grátis) e abra o link no celular. Para login sem confirmar e-mail, desative <b>Confirm email</b> em Authentication → Providers.</li>
    </ol>
  </div>`;
}
function showAuth(mode){
  appEl.classList.remove('show'); gate.classList.add('show');
  const signup = mode==='signup';
  gate.innerHTML=`<div class="gate-card">
    <div class="gate-brand"><div class="glyph"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div><div><h1>Gestor de Milhas</h1><small>${signup?'Criar conta':'Entrar'}</small></div></div>
    <div class="seg"><button class="${!signup?'active':''}" onclick="showAuth('signin')">Entrar</button><button class="${signup?'active':''}" onclick="showAuth('signup')">Criar conta</button></div>
    <div class="gate-err" id="auth-err"></div>
    <div class="field"><label>E-mail</label><input id="au-email" type="email" placeholder="voce@email.com"></div>
    <div class="field"><label>Senha</label><input id="au-pass" type="password" placeholder="${signup?'mínimo 6 caracteres':'sua senha'}"></div>
    <button class="btn btn-primary btn-block" onclick="${signup?'doSignUp()':'doSignIn()'}">${signup?'Criar conta':'Entrar'}</button>
  </div>`;
  setTimeout(()=>document.getElementById('au-email').focus(),50);
}
function authErr(msg){ const e=document.getElementById('auth-err'); if(e){ e.textContent=msg; e.classList.add('show'); } }
async function doSignIn(){
  const email=document.getElementById('au-email').value.trim(), password=document.getElementById('au-pass').value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ authErr(traduz(error.message)); return; }
  await afterLogin();
}
async function doSignUp(){
  const email=document.getElementById('au-email').value.trim(), password=document.getElementById('au-pass').value;
  if(password.length<6){ authErr('A senha precisa de pelo menos 6 caracteres.'); return; }
  const {data,error}=await sb.auth.signUp({email,password});
  if(error){ authErr(traduz(error.message)); return; }
  if(data.session){ await afterLogin(); }
  else { showAuth('signin'); toast('Conta criada. Se pedir confirmação, verifique seu e-mail e depois entre.'); }
}
function traduz(m){
  if(/Invalid login/i.test(m)) return 'E-mail ou senha incorretos.';
  if(/already registered/i.test(m)) return 'Este e-mail já tem conta. Tente entrar.';
  if(/Email not confirmed/i.test(m)) return 'Confirme seu e-mail antes de entrar (ou desative a confirmação no Supabase).';
  return m;
}
async function signOut(){ await sb.auth.signOut(); CURRENT_UID=null; STATE={beneficiaries:[],balances:[],clubs:[],values:{}}; showAuth('signin'); }
async function afterLogin(){
  const {data:{session}}=await sb.auth.getSession();
  CURRENT_UID=session.user.id; USER_EMAIL=session.user.email||'';
  document.getElementById('who-foot').textContent=USER_EMAIL;
  gate.classList.remove('show'); appEl.classList.add('show');
  await loadAll(); setView('dash');
}

/* expõe funções usadas inline */
Object.assign(window,{closeModal,saveBenef,openBenef,saveSaldo,saveClube,toggleCustom,needBenef,confirmDel,doDel,saveValues,setView,showAuth,doSignIn,doSignUp,signOut});
document.querySelectorAll('#nav a[data-view], #mobnav a[data-view]').forEach(a=>a.addEventListener('click',()=>setView(a.dataset.view)));

/* ===================== Início ===================== */
(async function init(){
  if(!configured){ showSetup(); return; }
  if(!window.supabase){ showSetup(); toast('Biblioteca do Supabase não carregou. Verifique a conexão.','bad'); return; }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  const {data:{session}}=await sb.auth.getSession();
  if(session) await afterLogin(); else showAuth('signin');
})();
</script>
